<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: dark purple rounded square -->
  <rect width="64" height="64" rx="14" fill="#1A1025"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.25"/>

  <!-- Graduation cap: mortarboard top (diamond/rhombus shape) -->
  <polygon
    points="32,12 54,22 32,32 10,22"
    fill="#F59E0B"
  />

  <!-- Cap board shine -->
  <polygon
    points="32,12 54,22 32,21 10,22"
    fill="#FBBF24"
    opacity="0.4"
  />

  <!-- Cap body / base cylinder -->
  <path
    d="M21,26 L21,38 Q21,42 32,42 Q43,42 43,38 L43,26 L32,31 Z"
    fill="#F59E0B"
  />

  <!-- Tassel string -->
  <line x1="54" y1="22" x2="54" y2="34" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="54" cy="36" r="3" fill="#FBBF24"/>
  <!-- Tassel fringe -->
  <line x1="52" y1="38" x2="51" y2="43" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="39" x2="54" y2="44" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="38" x2="57" y2="43" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Highlight dot on cap centre -->
  <circle cx="32" cy="22" r="2.5" fill="#FEF3C7" opacity="0.6"/>
</svg>
